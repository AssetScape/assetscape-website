<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AssetScape</title>
    <script>
      // Single-page app redirect for static hosts.
      // GitHub Pages needs the /assetscape-website/ prefix preserved; the
      // production domain is served from /.
      var isGithubProjectPage = window.location.hostname.indexOf('github.io') !== -1 &&
        window.location.pathname.indexOf('/assetscape-website/') === 0;
      var pathSegmentsToKeep = isGithubProjectPage ? 1 : 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
